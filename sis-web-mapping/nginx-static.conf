# Static SPA serving config for sis-web-mapping. The container is intended to
# sit behind sis-nginx, which adds TLS termination and routes /api, /downloads,
# /metadata, /mapserver. This server only serves the built bundle.
server {
    listen 8000;
    listen [::]:8000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    client_max_body_size 1m;          # SPA never receives uploads directly

    # Baseline hardening headers; sis-nginx may add more.
    add_header X-Frame-Options          "SAMEORIGIN"           always;
    add_header X-Content-Type-Options   "nosniff"              always;
    add_header Referrer-Policy          "no-referrer-when-downgrade" always;
    add_header Permissions-Policy       "geolocation=(self), camera=()" always;

    # SPA fallback so client-side routing works on direct deep-links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed static assets, no-cache the entrypoint.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }
    location ~* \.(js|css|svg|woff2?|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Belt-and-braces: even though we build with --no-source-maps, refuse any
    # leaked .map files explicitly.
    location ~* \.map$ {
        return 404;
    }
}
